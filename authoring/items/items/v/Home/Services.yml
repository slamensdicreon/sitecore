      Hint: Content
      Value: "<h2>White-Glove, End to End</h2><p>From first sketch to first swim: <strong>bespoke design, renovation, white-glove maintenance, equipment automation, diagnostics, and opening &amp; closing</strong>.</p><ul><li><strong>Bespoke Design</strong> &mdash; site study, hand-drawn concept, material palette.</li><li><strong>Build &amp; Renovation</strong> &mdash; permanent shells, gallery-grade finishes.</li><li><strong>White-Glove Maintenance</strong> &mdash; weekly stewardship, chemistry, polish.</li><li><strong>Equipment Automation</strong> &mdash; smart controls, energy management.</li><li><strong>Diagnostics</strong> &mdash; quiet hydraulics, water clarity, structural review.</li><li><strong>Opening &amp; Closing</strong> &mdash; seasonal rituals, done right.</li></ul>"
